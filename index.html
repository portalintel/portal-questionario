<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu Questionário</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <form id="meuQuestionario">
        <fieldset>
            <legend>Informações Pessoais</legend>
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" required>
        </fieldset>

        <fieldset>
            <legend>Pergunta 1: Qual sua linguagem favorita?</legend>
            <input type="radio" id="js" name="linguagem" value="javascript">
            <label for="js">JavaScript</label>
            
            <input type="radio" id="python" name="linguagem" value="python">
            <label for="python">Python</label>
        </fieldset>

        <button type="submit">Enviar Respostas</button>
    </form>

    <script src="script.js"></script>
</body>
</html>
