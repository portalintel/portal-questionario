<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oferta Especial | Arrecadação Inteligente</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            text-align: center; 
            padding: 40px 20px; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: linear-gradient(135deg, #f4f7f9 0%, #e9ecef 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card { 
            background: white;
            border: none; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 450px; 
            width: 100%;
        }
        h1 { color: #0056b3; margin-bottom: 20px; }
        p { font-size: 1.1rem; color: #555; margin-bottom: 25px; line-height: 1.5; }
        .highlight { color: #d9534f; font-weight: bold; font-size: 1.2rem; }
        .btn-oferta { 
            background: #28a745; 
            color: white; 
            padding: 18px 25px; 
            text-decoration: none; 
            border-radius: 10px; 
            font-weight: bold; 
            font-size: 1.1rem;
            display: block; 
            transition: transform 0.2s, background 0.3s;
        }
        .btn-oferta:hover { 
            background: #218838; 
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Praticidade e Modernidade!</h1>
        <p>Você quer automação de verdade?</p>
        <p>Por apenas <strong>R$ 13,00</strong>, você garante acesso à nossa tecnologia exclusiva e ainda <span class="highlight">concorre a R$ 1.000,00!</span></p>
        <a href="https://portalintel.github.io/portal-inteligente-A/" class="btn-oferta">QUERO PARTICIPAR AGORA</a>
    </div>
</body>
</html>
